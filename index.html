<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example Domain</title>
  <style>
    /* Base reset & tokens */
    body {
      background: #ffffff;
      color: #000000;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 16px;
      margin: 0;
      padding: 1em;
    }

    /* Centering container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1em;
    }

    /* Heading */
    h1 {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-weight: 700;
      color: #000000;
      margin: 0.67em 0;
    }

    /* Body paragraphs */
    p {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 16px;
      color: #000000;
      line-height: 1.5;
    }

    /* Anchor / CTA link */
    a {
      color: #0057b8;
      text-decoration: underline;
    }

    a:visited {
      color: #0057b8;
    }

    a:hover {
      color: #003d82;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Example Domain</h1>
    <p>
      This domain is for use in illustrative examples in documents. You may use this
      domain in literature without prior coordination or asking for permission.
    </p>
    <p>
      <a href="https://www.iana.org/domains/reserved">More information...</a>
    </p>
  </div>
</body>
</html>
